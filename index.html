<!doctype html>
<html lang="te">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f7f7a" />
  <title>Sri Nidhi Study Hall</title>
  <link rel="stylesheet" href="style.css?v=2.8.3" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="favicon.png?v=2.5.0" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2.5.0" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <section id="loginView" class="login-wrap">
    <div class="login-card">
      <div class="logo">SN</div>
      <h1>Sri Nidhi Study Hall</h1>
      <p>Management & Security System</p>
      <label>Username</label>
      <input id="loginUser" value="admin" autocomplete="username" />
      <label>Password</label>
      <input id="loginPass" type="password" value="1234" autocomplete="current-password" />
      <button id="loginBtn" class="primary full">Login</button>
      <small>Demo Login: admin / 1234</small>
      <div id="loginError" class="error"></div>
    </div>
  </section>

  <div id="appView" class="app hidden">
    <div id="overlay" class="overlay hidden"></div>
    <aside class="sidebar" id="sidebar">
      <div class="brand"><div class="brand-logo">SN</div><div><b id="sideHallName">Sri Nidhi</b><span>Study Hall</span></div></div>
      <nav id="navMenu">
        <button data-page="dashboard" class="active">Home</button>
        <button data-page="students">Students</button>
        <button data-page="admissions">Admissions</button>
        <button data-page="fees">Fees</button>
        <button data-page="pending">Pending Fees</button>
        <button data-page="attendance">Attendance</button>
        <button data-page="movement">Entry / Exit</button>
        <button data-page="notices">Notices</button>
        <button data-page="diary">Daily Diary</button>
        <button data-page="dailyupdates">Daily Updates</button>
        <button data-page="reports">Reports</button>
        <button data-page="settings">Settings</button>
      </nav>
      <button id="logoutBtn" class="logout">Logout</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <button id="menuBtn" class="menu-btn" aria-label="Open menu">☰</button>
        <div class="top-title"><h2 id="pageTitle">Home</h2><p id="todayText"></p></div>
        <div class="admin-chip">Admin</div>
      </header>
      <section id="pageContent" class="content"></section>
    </main>
  </div>

  <div id="modal" class="modal hidden"><div class="modal-box"><button id="modalClose" class="modal-close">×</button><div id="modalBody"></div></div></div>
  <script>
(async()=>{try{if("caches" in window){for(const k of await caches.keys()){if(!k.includes("v2.8.3-stable"))await caches.delete(k)}}if("serviceWorker" in navigator){const regs=await navigator.serviceWorker.getRegistrations();for(const r of regs)await r.update()}}catch(e){console.warn(e)}})();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs"; window.pdfjsLib=pdfjsLib;</script>
<script src="app.js?v=2.8.3"></script>
  <script>if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js?v=2.7.0", {updateViaCache:"none"}).then(r=>r.update()).catch(()=>{})}</script>
<div style="position:fixed;right:8px;bottom:8px;z-index:9999;font:700 10px system-ui;color:#0b6662;background:rgba(255,255,255,.9);padding:4px 7px;border-radius:8px;border:1px solid #e2e8f0">v2.8.3 Stable</div>
</body>
</html>
