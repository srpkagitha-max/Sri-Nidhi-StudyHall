<!doctype html>
<html lang="te">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f7f7a" />
  <title>Sri Nidhi Study Hall</title>
  <link rel="stylesheet" href="style.css?v=4.1.2" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="favicon.png?v=2.5.0" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2.5.0" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <section id="loginView" class="login-wrap exam-login-wrap">
    <div class="exam-login-shell">
      <header class="exam-login-header">
        <div class="logo">SN</div>
        <div><h1>Sri Nidhi Study Hall</h1><p>Management & Student Portal</p></div>
      </header>
      <div class="login-card exam-student-card">
        <div class="student-login-heading">Student Login</div>
        <p class="login-subtext">Enter your Student ID and password</p>
        <div id="studentLoginPanel" class="login-panel">
          <label>Student ID</label>
          <input id="studentLoginId" placeholder="Enter Student ID" autocomplete="username" autocapitalize="characters" />
          <label>Password</label>
          <input id="studentLoginPassword" type="password" placeholder="Enter Password" autocomplete="current-password" />
          <button id="studentLoginBtn" class="primary full exam-start-btn">STUDENT LOGIN →</button>
          <div class="secure-login-note"><b>Secure Student Login</b><span>Use the Student ID and password provided by the admin.</span></div>
          <div id="studentLoginError" class="error"></div>
        </div>
        <button id="showAdminLogin" class="admin-login-link bottom-admin-link" type="button">Administrator Login</button>
        <button id="showStudentLogin" class="hidden" type="button">Student Login</button>
        <div id="adminLoginPanel" class="login-panel hidden admin-panel-simple">
          <label>Username</label><input id="loginUser" value="admin" autocomplete="username" />
          <label>Password</label><input id="loginPass" type="password" autocomplete="current-password" />
          <button id="loginBtn" class="primary full">Admin Login</button>
          <button type="button" class="student-back-link" onclick="switchLoginRole('student')">← Back to Student Login</button>
          <div id="loginError" class="error"></div>
        </div>
      </div>
    </div>
  </section>

  <div id="appView" class="app hidden">
    <div id="overlay" class="overlay hidden"></div>
    <aside class="sidebar" id="sidebar">
      <div class="brand"><div class="brand-logo">SN</div><div><b id="sideHallName">Sri Nidhi</b><span>Study Hall</span></div></div>
      <nav id="navMenu">
        <button data-page="dashboard" class="active">Dashboard</button>
        <button data-page="students">Students</button>
        <button data-page="admissions">Admissions</button>
        <button data-page="attendance">Attendance</button>
        <button data-page="movement">Entry / Exit</button>
        <button data-page="fees">Fees & Reports</button>
      </nav>
      <button id="logoutBtn" class="logout">Logout</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <button id="menuBtn" class="menu-btn" aria-label="Open menu">☰</button>
        <div class="top-title"><h2 id="pageTitle">Home</h2><p id="todayText"></p></div>
        <button class="admin-chip" onclick="render('settings')">⚙</button>
      </header>
      <section id="pageContent" class="content"></section>
    </main>
  </div>

  <div id="studentAppView" class="student-app hidden">
    <header class="student-topbar">
      <div class="student-brand"><div class="brand-logo">SN</div><div><b id="studentHallName">Sri Nidhi Study Hall</b><span>Student Portal</span></div></div>
      <button id="studentLogoutBtn" class="secondary">Logout</button>
    </header>
    <main class="student-main">
      <section id="studentWelcome" class="student-welcome"></section>
      <section id="studentPageContent" class="student-content"></section>
    </main>
  </div>

  <div id="modal" class="modal hidden"><div class="modal-box"><button id="modalClose" class="modal-close">×</button><div id="modalBody"></div></div></div>
  <script>
(async()=>{try{if("caches" in window){for(const k of await caches.keys()){if(!k.includes("v4.0-final"))await caches.delete(k)}}if("serviceWorker" in navigator){const regs=await navigator.serviceWorker.getRegistrations();for(const r of regs)await r.update()}}catch(e){console.warn(e)}})();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs"; window.pdfjsLib=pdfjsLib;</script>
<script src="app.js?v=4.1.2"></script>
<script src="cloud-sync.js?v=4.0.0"></script>
  <script>if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js?v=4.1.2", {updateViaCache:"none"}).then(r=>r.update()).catch(()=>{})}</script>
<div style="position:fixed;right:8px;bottom:8px;z-index:9999;font:700 10px system-ui;color:#0b6662;background:rgba(255,255,255,.9);padding:4px 7px;border-radius:8px;border:1px solid #e2e8f0">v4.1.2</div>
</body>
</html>
